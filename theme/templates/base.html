{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="en">
<head>
    <title>MIRA Primer Analyzer App</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    {% tailwind_css %}
</head>

<body class="bg-gray-50 text-gray-900 font-sans leading-normal tracking-normal flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-white shadow">
        <div class="container mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600"><a href="{% url 'index' %}">MIRA Primer Analyzer App</a></h1>
            <nav>
                <ul class="flex space-x-4">
                    <li><a href="{% url 'index' %}" class="text-gray-700 hover:text-blue-600">Home</a></li>
                    <li><a href="{% url 'rules' %}" class="text-gray-700 hover:text-blue-600">Rules</a></li>
                    <li><a href="#" class="text-gray-700 hover:text-blue-600">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow container mx-auto px-4 py-8">
        {% block content %}
        {% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="bg-gray-800 text-white mt-auto">
        <div class="container mx-auto px-6 py-4 text-center">
            <p>&copy; 2026 Mira Primer Analysis Tool. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
